services:
  postgres:
    image: postgres:16-alpine
    container_name: confeccao-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-confeccao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-confeccao}
      POSTGRES_DB: ${POSTGRES_DB:-confeccao}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-confeccao} -d ${POSTGRES_DB:-confeccao}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: confeccao-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-confeccao};Username=${POSTGRES_USER:-confeccao};Password=${POSTGRES_PASSWORD:-confeccao}"
      CORS_ALLOWED_ORIGINS: "http://localhost:${FRONTEND_PORT:-3000}"
      SEED_SAMPLE_DATA: "${SEED_SAMPLE_DATA:-false}"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "${BACKEND_PORT:-5080}:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:${BACKEND_PORT:-5080}"
    container_name: confeccao-frontend
    depends_on:
      - backend
    environment:
      # Browser → backend: through the published port on localhost.
      NEXT_PUBLIC_API_URL: "http://localhost:${BACKEND_PORT:-5080}"
      # Server-side fetch (RSC) → backend: stays on the docker network.
      INTERNAL_API_URL: "http://backend:8080"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres-data:
